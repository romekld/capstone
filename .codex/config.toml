model_context_window = 1_000_000

[mcp_servers.shadcn]
command = "npx"
args = [ "shadcn@latest", "mcp" ]

[mcp_servers.playwright]
command = "npx"
args = [ "@playwright/mcp@latest" ]

[mcp_servers.supabase]
url = "https://mcp.supabase.com/mcp"

[mcp_servers.vercel]
type = "http"
url = "https://mcp.vercel.com"

[features]
rmcp_client = true
